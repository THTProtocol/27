upstream hightable { server 127.0.0.1:3000; }

server {
    listen 80;
    server_name hightable.pro www.hightable.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hightable.pro www.hightable.pro;
    ssl_certificate /etc/letsencrypt/live/hightable.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hightable.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /root/htp/public;
    index index.html;

    location = /health {
        proxy_pass http://hightable/health;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://hightable;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location /ws {
        proxy_pass http://hightable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|svg|png|ico)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
