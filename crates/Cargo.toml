[workspace]
resolver = "2"
members = [
    "mirofish-bridge",
    "htp-daemon",
]

[workspace.package]
edition = "2021"
rust-version = "1.75.0"
version = "0.1.0"
authors = ["High Table Protocol"]

[workspace.dependencies]
tokio = { version = "1.43", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
