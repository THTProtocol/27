[package]
name = "htp-rust-backend"
version = "0.1.0"
edition = "2021"
description = "High Table Protocol – Rust backend replacing browser WASM implementation"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.5", features = ["cors"] }
tokio-stream = "0.1"

