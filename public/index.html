<script id="htp-feeaddr-patch">
// HTP Protocol Fee Address -- network-aware override
(function() {
  var MAINNET_FEE = 'kaspa:qza6ah0lfqf33c9m00ynkfeettuleluvnpyvmssm5pzz7llwy2ka5nkka4fel';
  var TN12_FEE    = 'kaspa:qr6vs4wy4m3za6mzchj05x3902qrtklkyn8s0u8g2gv6mrctzdzx7pnhqxka2';

  function getActiveFeeAddr() {
    var net = window.activeNet || 'tn12';
    return net === 'mainnet' ? MAINNET_FEE : TN12_FEE;
  }

  // Override the module-level constant used by all settlement functions
  Object.defineProperty(window, 'HTP_FEE_ADDR', {
    get: function() { return getActiveFeeAddr(); },
    configurable: true
  });

  // Patch after covenants module loads
  function patchFeeAddr() {
    if (window.HTPCOVENANTCONFIG) {
      Object.defineProperty(window.HTPCOVENANTCONFIG, 'PROTOCOLFEEADDR', {
        get: function() { return getActiveFeeAddr(); },
        configurable: true
      });
    }
    // Patch the runtime settlement override used by htp-patches-8.js (FEEADDR)
    window.FEEADDR = getActiveFeeAddr();
    // Re-patch on network switch
    window.addEventListener('htp-network-changed', function() {
      window.FEEADDR = getActiveFeeAddr();
    });
    console.log('[HTP FeeAddr] Active fee address:', getActiveFeeAddr());
  }

  if (document.readyState === 'complete') {
    setTimeout(patchFeeAddr, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(patchFeeAddr, 100); });
  }
})();
</script>

<script id="htp-payload-patch">
// HTP Payload patch -- attach match metadata to stake TX
(function() {
  function toHex(str) {
    var result = '';
    for (var i = 0; i < str.length; i++)
      result += str.charCodeAt(i).toString(16).padStart(2, '0');
    return result;
  }

  // Payload patch v2: NO payload injection into on-chain TX (breaks Schnorr sighash).
  // Match metadata is stored in Firebase only; on-chain TX is a clean P2PK send.
  var _orig = window.htpSendTx;
  function waitAndPatch() {
    if (typeof window.htpSendTx !== 'function') {
      setTimeout(waitAndPatch, 200); return;
    }
    var orig = window.htpSendTx;
    window.htpSendTx = function(toAddr, amountSompi, opts) {
      opts = opts || {};
      // Strip any payload , payload in createTransaction corrupts Schnorr sighash
      delete opts.payload;
      delete opts.payloadData;
      const resolvedAmount = amountSompi ?? (opts && opts.amount);
      return orig.call(this, toAddr, resolvedAmount, Object.assign({}, opts, { amount: resolvedAmount }));
    };
    console.log('[HTP Payload] htpSendTx patched -- clean TX (no payload)');
  }
  waitAndPatch();
})();
</script>


<script>
(function(){
  function showPill(addr, bal){
    var p=document.getElementById('htpWalletPillV3');
    if(!p)return;
    p.style.display='flex';
    var a=document.getElementById('htpPillAddr3');
    var b=document.getElementById('htpPillBal3');
    if(a) a.textContent = addr ? addr.slice(0,12)+'...'+addr.slice(-6) : '';
    if(b) b.textContent = bal ? parseFloat(bal).toFixed(2)+' KAS' : '';
    window.htpWalletAddress = addr;
    window.htpBalance = bal;
  }
  function hidePill(){
    var p=document.getElementById('htpWalletPillV3');
    if(p) p.style.display='none';
  }
  // Intercept the balance/connect log points
  var _origConsole = console.log.bind(console);
  // Poll for htpWalletAddress being set by any module
  var _pillTimer = setInterval(function(){
    var addr = window.htpWalletAddress || window.htpConnectedAddress || window._htpAddress;
    var bal  = window.htpBalance || window.htpBalanceKas;
    if(addr){ showPill(addr, bal); }
    // Also check the seed connect log pattern
    var seedEl = document.querySelector('[id*="walletAddr"],[id*="wallet-addr"],[class*="walletAddr"]');
    if(seedEl && seedEl.textContent.includes('kaspatest:')){ showPill(seedEl.textContent.trim(), bal); }
  }, 800);
  // Hook into any future htpSeedConnected / htpBalanceUpdated events
  window.addEventListener('htpSeedConnected', function(e){ if(e.detail) showPill(e.detail.address, e.detail.balance); });
  window.addEventListener('htpBalanceUpdated', function(e){ if(e.detail) showPill(window.htpWalletAddress, e.detail.balance); });
  window.addEventListener('htpDisconnected', hidePill);
  // Export for modules that call updateBalanceDisplay
  var _origUpdate = window.updateBalanceDisplay;
  try { if(!Object.getOwnPropertyDescriptor(window,'updateBalanceDisplay') || Object.getOwnPropertyDescriptor(window,'updateBalanceDisplay').configurable) Object.defineProperty(window,'updateBalanceDisplay',{
    set:function(fn){
      _origUpdate=fn;
      window._updateBalanceDisplayReal=fn;
    },
    get:function(){
      return function(addr,bal){
        if(_origUpdate) _origUpdate(addr,bal);
        showPill(addr,bal);
      };
    }
  }); } catch(e) {}
  console.log('[HTP Pill v3] Wallet display injected');
})();
</script>

<script>
(function() {
  if (window.__htpCancelWired) return;
  window.__htpCancelWired = true;

  // Inject Cancel button on lobby cards owned by current wallet
  function injectCancelButtons() {
    const myAddr = window.htpAddress || window.walletAddress || '';
    if (!myAddr) return;

    document.querySelectorAll('[data-matchid], [data-match-id]').forEach(card => {
      const matchId = card.dataset.matchid || card.dataset.matchId;
      if (!matchId) return;

      // Check if already has cancel button
      if (card.querySelector('.htp-cancel-btn')) return;

      // Find creator from local match store
      const store = window.htpMatches || window.openMatches || {};
      const m = store[matchId];
      if (!m) return;

      const isCreator = m.creator === myAddr || m.creatorAddress === myAddr;
      if (!isCreator) return;

      const joinBtn = card.querySelector('button') || card.querySelector('.join-btn');
      if (!joinBtn) return;

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'htp-cancel-btn';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = (e) => {
        e.stopPropagation();
        if (typeof window.cancelLobbyMatch === 'function') {
          window.cancelLobbyMatch(matchId);
        }
      };

      joinBtn.parentElement.appendChild(cancelBtn);
    });
  }

  const obs = new MutationObserver(injectCancelButtons);
  obs.observe(document.body, { childList: true, subtree: true });
  setInterval(injectCancelButtons, 2000);

  document.addEventListener('htpLobbyCancelled', () => setTimeout(injectCancelButtons, 300));
  document.addEventListener('htpMatchOpened', () => setTimeout(injectCancelButtons, 500));
})();
</script>

<script id="htp-settlement-race-guard">
(function() {
  var _origSettle = window.settleMatchPayout;
  if (typeof _origSettle !== "function") {
    setTimeout(function() {
      var _orig2 = window.settleMatchPayout;
      if (typeof _orig2 !== "function") return;
      window.settleMatchPayout = wrapSettle(_orig2);
      console.log("[High Table Fix2] Race guard patched (deferred)");
    }, 3000);
    return;
  }
  window.settleMatchPayout = wrapSettle(_origSettle);
  console.log("[High Table Fix2] Race guard patched");

  function wrapSettle(orig) {
    return async function(matchId, winnerAddress, isDraw, CreatorAddr, ChallengerAddr) {
      var NETWORKFEE = 5000;
      var SOMPI = 100000000;
      var stakeKas = 0;
      try {
        if (typeof matchLobby !== "undefined" && matchLobby.activeMatch) {
          stakeKas = parseFloat(matchLobby.activeMatch.stake || 0);
        }
      } catch(e) {}

      if (stakeKas > 0) {
        var expectedMin = Math.round(stakeKas * 2 * SOMPI) - (NETWORKFEE * 2);
        var restUrl = "https://api-tn12.kaspa.org";
        try {
          if (typeof KASPANETS !== "undefined" && typeof activeNet !== "undefined") {
            restUrl = KASPANETS[activeNet].rest;
          }
        } catch(e) {}

        var escrow = null;
        try {
          var s1 = JSON.parse(localStorage.getItem("htpcovenantescrows") || "{}");
          var s2 = JSON.parse(localStorage.getItem("htpescrowkeys") || "{}");
          escrow = s1[matchId] || s2[matchId];
        } catch(e) {}

        if (escrow) {
          var escAddr = escrow.p2pkAddress || escrow.address;
          for (var attempt = 0; attempt < 3; attempt++) {
            try {
              var resp = await fetch(restUrl + "/addresses/" + escAddr + "/utxos");
              var utxos = resp.ok ? await resp.json() : [];
              var total = utxos.reduce(function(s, u) {
                return s + Number((u.utxoEntry || u.entry || u).amount || 0);
              }, 0);
              if (total >= expectedMin) break;
              console.warn("[High Table Fix2] Escrow underfunded:", (total/SOMPI).toFixed(4), "KAS, need", stakeKas*2, "KAS , attempt", attempt+1, "of 3");
              if (typeof showToast === "function") showToast("Waiting for escrow funding... (" + (attempt+1) + "/3)", "info");
              if (attempt < 2) await new Promise(function(r) { setTimeout(r, 8000); });
            } catch(e) { break; }
          }
        }
      }

      return orig.call(this, matchId, winnerAddress, isDraw, CreatorAddr, ChallengerAddr);
    };
  }
})();
</script>
