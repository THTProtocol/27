<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HTP Wallet</title>
<style>
:root { --bg: #060a16; --card: rgba(6,10,22,0.85); --accent: #49e8c2; --gold: #f0a040; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background: var(--bg); color:#e2e8f0; font-family:Inter,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem; }
.card { background:var(--card); border:1px solid rgba(148,163,184,0.12); border-radius:12px; padding:2rem; margin:1rem 0; width:100%; max-width:600px; }
h2 { color:var(--gold); margin-bottom:1rem; font-size:1.3rem; }
input, textarea { width:100%; padding:0.75rem; margin:0.5rem 0; background:rgba(255,255,255,0.05); border:1px solid rgba(148,163,184,0.2); border-radius:8px; color:#e2e8f0; font-family:monospace; font-size:0.9rem; }
.btn { display:inline-block; padding:0.6rem 1.5rem; margin:0.5rem 0.25rem; border:none; border-radius:8px; cursor:pointer; font-size:0.9rem; font-weight:600; }
.btn-primary { background:var(--accent); color:#060a16; }
.btn-secondary { background:rgba(255,255,255,0.1); color:#e2e8f0; border:1px solid rgba(255,255,255,0.15); }
code.addr { word-break:break-all; font-size:0.75rem; color:var(--accent); display:block; margin:0.5rem 0; background:rgba(0,0,0,0.3); padding:0.5rem; border-radius:6px; }
code.key { word-break:break-all; font-size:0.7rem; color:var(--gold); display:block; margin:0.5rem 0; background:rgba(0,0,0,0.3); padding:0.5rem; border-radius:6px; }
.status { padding:0.5rem; border-radius:6px; margin:0.5rem 0; font-size:0.85rem; }
.status-ok { background:rgba(73,232,194,0.1); color:var(--accent); }
.status-warn { background:rgba(240,160,64,0.1); color:var(--gold); }
a { color:var(--accent); }
nav { margin-bottom:1.5rem; }
nav a { color:var(--accent); text-decoration:none; margin:0 0.75rem; font-weight:500; }
nav a:hover { text-decoration:underline; }
</style>
</head>
<body>
<nav>
  <a href="/index.html">Home</a>
  <a href="/wallet.html">Wallet</a>
  <a href="/game.html">Play</a>
</nav>

<h2 style="color:#f0a040">Wallet (TN12 Testnet)</h2>

<div class="card">
  <h2>Connect Existing Wallet</h2>
  <p style="font-size:0.85rem; opacity:0.7; margin-bottom:0.75rem">Paste your 64-char hex private key (stored in browser only)</p>
  <input id="key-input" type="password" placeholder="64 hex characters..." maxlength="64">
  <div style="text-align:right">
    <button class="btn btn-primary" onclick="saveKey()">Save Key</button>
  </div>
  <div id="status" class="status"></div>
</div>

<div class="card">
  <h2>Generate New Wallet</h2>
  <button class="btn btn-primary" onclick="genWallet()">Generate Keypair</button>
  <div id="out"></div>
</div>

<div class="card">
  <h2>Balance</h2>
  <button class="btn btn-secondary" onclick="showBalance()">Check Balance</button>
  <div id="bal-out"></div>
</div>

<script src="wallet-inline.js"></script>
</body>
</html>
