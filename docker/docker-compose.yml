version: "3.8"
services:
  htp-server-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      - HTP_NODE_ID=1
      - HTP_HOST=htp-server-1
      - PORT=3000
      - RUST_LOG=info
    volumes:
      - htp-data:/data/htp
    restart: unless-stopped

  htp-server-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3001:3000"
    environment:
      - HTP_NODE_ID=2
      - HTP_HOST=htp-server-2
      - PORT=3000
      - RUST_LOG=info
    volumes:
      - htp-data:/data/htp
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - htp-server-1
      - htp-server-2
    restart: unless-stopped

volumes:
  htp-data:
