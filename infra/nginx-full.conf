# ── High Table Protocol — nginx production config ────────────────────────────
# Active on: hightable.pro (Hetzner VPS root@178.105.76.81)
# To apply:  cp infra/nginx-full.conf /etc/nginx/sites-available/hightable.pro
#            nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

upstream htp_rust  { server 127.0.0.1:3000; }  # Rust htp-server  (PM2 id=0)
upstream htp_orders { server 127.0.0.1:3001; } # Node orders-api  (PM2 htp-orders)

server {
    listen 80;
    server_name hightable.pro www.hightable.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hightable.pro www.hightable.pro;

    ssl_certificate     /etc/letsencrypt/live/hightable.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hightable.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root  /root/htp/public;
    index index.html;

    # ── Health ──────────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://htp_rust/health;
        proxy_set_header Host $host;
    }

    # ── Orders API (Node :3001) — must come BEFORE /api/ ────────────────────
    location /api/orders {
        proxy_pass http://htp_orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Core API (Rust :3000) ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://htp_rust;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── WebSocket ────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://htp_rust;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets ────────────────────────────────────────────────────────
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}
