name: Deploy Rust Backend → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - '27/htp-rust-backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: hightable420

      - name: Deploy to Cloud Run
        working-directory: 27/htp-rust-backend
        run: |
          gcloud run deploy htp-backend \
            --source . \
            --region europe-west1 \
            --project hightable420 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "KASPA_NETWORK=testnet-12,KASPA_API_BASE=https://api-tn12.kaspa.org" \
            --quiet

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe htp-backend \
            --region europe-west1 \
            --project hightable420 \
            --format 'value(status.url)')
          echo "✅ Rust backend live at: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

      - name: Write URL to repo (for hosting workflow to pick up)
        run: |
          echo ${{ env.CLOUD_RUN_URL }} > 27/.cloud-run-url
          git config user.email "ci@hightable.protocol"
          git config user.name "HTP CI"
          git add 27/.cloud-run-url
          git diff --cached --quiet || git commit -m "ci: update Cloud Run URL [skip ci]" && git push
